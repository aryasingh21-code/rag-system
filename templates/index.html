<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 32px 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            padding: 0 8px;
        }

        h1 {
            font-size: clamp(1.4rem, 5vw, 2rem);
            margin-bottom: 8px;
            color: #7dd3fc;
        }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(0.8rem, 3vw, 0.95rem);
            line-height: 1.5;
        }

        .chat-box {
            width: 100%;
            max-width: 780px;
            background: #1e293b;
            border-radius: 16px;
            padding: clamp(16px, 4vw, 30px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            min-width: 0; /* prevents overflow on mobile */
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: clamp(0.88rem, 3vw, 1rem);
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: #7dd3fc;
        }

        button {
            padding: 12px 20px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: clamp(0.88rem, 3vw, 1rem);
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        button:hover { background: #0284c7; }
        button:disabled { background: #334155; cursor: not-allowed; }

        .result { display: none; }

        .answer-box {
            background: #0f172a;
            border-left: 4px solid #0ea5e9;
            padding: 16px 18px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.75;
            font-size: clamp(0.88rem, 3vw, 0.97rem);
        }

        .sources-title {
            font-size: 0.82rem;
            color: #7dd3fc;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sources-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .source-tag {
            display: inline-block;
            background: #1e3a5f;
            color: #7dd3fc;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: clamp(0.75rem, 2.5vw, 0.82rem);
            cursor: pointer;
            position: relative;
        }

        .source-tag:hover {
            background: #2c5282;
        }

        /* Tooltip: flip to bottom on mobile so it doesn't go off-screen */
        .source-preview {
            display: none;
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: min(90vw, 320px);
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.78rem;
            color: #cbd5e1;
            line-height: 1.5;
            z-index: 100;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
            white-space: normal;
            pointer-events: none;
        }

        .source-tag:hover .source-preview,
        .source-tag:focus .source-preview {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #94a3b8;
            padding: 20px;
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid #334155;
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #f87171;
            background: #1e1e2e;
            padding: 12px 16px;
            border-radius: 8px;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📄 RAG Document Assistant</h1>
        <p class="subtitle">Ask questions about your documents — powered by Hybrid Search + Reranking</p>
    </div>

    <div class="chat-box">
        <div class="input-row">
            <input type="text" id="question" placeholder="Ask a question about your documents..." />
            <button id="askBtn" onclick="askQuestion()">Ask</button>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span> Searching and generating answer...
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="answer-box" id="answer"></div>
            <div class="sources-title">📌 Sources</div>
            <div class="sources-list" id="sources"></div>
        </div>
    </div>

    <script>
        document.getElementById("question").addEventListener("keypress", function(e) {
            if (e.key === "Enter") askQuestion();
        });

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function formatSourceLabel(src) {
            const parts = [src.source];
            if (src.page !== null && src.page !== undefined) {
                parts.push(`p.${src.page}`);
            }
            if (src.paragraph !== null && src.paragraph !== undefined) {
                parts.push(`para ${src.paragraph}`);
            }
            return parts.join(" · ");
        }

        async function askQuestion() {
            const question = document.getElementById("question").value.trim();
            if (!question) return;

            const btn = document.getElementById("askBtn");
            btn.disabled = true;
            document.getElementById("loading").style.display = "block";
            document.getElementById("result").style.display = "none";
            document.getElementById("error").style.display = "none";

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                document.getElementById("answer").textContent = data.answer;

                const sourcesDiv = document.getElementById("sources");
                sourcesDiv.innerHTML = "";

                data.sources.forEach(src => {
                    const tag = document.createElement("span");
                    tag.className = "source-tag";
                    tag.setAttribute("tabindex", "0");
                    tag.textContent = formatSourceLabel(src);

                    const preview = document.createElement("div");
                    preview.className = "source-preview";
                    preview.innerHTML = escapeHtml(src.text.slice(0, 280)) + (src.text.length > 280 ? "…" : "");
                    tag.appendChild(preview);

                    sourcesDiv.appendChild(tag);
                });

                document.getElementById("result").style.display = "block";
            } catch (err) {
                document.getElementById("error").textContent = "Something went wrong. Is the server running?";
                document.getElementById("error").style.display = "block";
            } finally {
                document.getElementById("loading").style.display = "none";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
